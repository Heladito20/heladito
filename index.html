<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Lunita Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Título principal -->
  <h1>🌙 Mi Universo Romántico 💖</h1>

  <!-- Sección especial de la luna -->
  <div class="luna-section">
    <img src="images/luna.png" alt="Luna y nosotros">
    <p id="frase-luna">✨ Eres mi universo ✨</p>
  </div>

  <!-- Galería de fotos -->
  <div class="gallery">
    <img src="images/1.jpeg" alt="Recuerdo 1">
    <img src="images/2.jpeg" alt="Recuerdo 2">
    <img src="images/3.jpeg" alt="Recuerdo 3">
    <img src="images/4.jpeg" alt="Recuerdo 4">
    <img src="images/5.jpeg" alt="Recuerdo 5">
    <img src="images/6.jpeg" alt="Recuerdo 6">
    <img src="images/7.jpeg" alt="Recuerdo 7">
    <img src="images/8.jpeg" alt="Recuerdo 8">
    <img src="images/9.jpeg" alt="Recuerdo 9">
    <img src="images/10.jpeg" alt="Recuerdo 10">
  </div>

  <!-- Contador de tiempo juntos -->
  <div id="contador">
    💖 Hemos estado juntos por 0 años, 5 meses y 0 días 💖
  </div>

  <!-- Playlist de Spotify -->
  <div class="spotify-section">
    <h2>Nuestra música 🎶</h2>
    <iframe style="border-radius:12px;" 
      src="https://open.spotify.com/embed/playlist/2NGQMMl13DZJylwb4x21dE?utm_source=generator" 
      width="300" height="380" frameborder="0" 
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
      loading="lazy"></iframe>

    <p style="margin-top:10px;">
      <a href="https://open.spotify.com/playlist/2NGQMMl13DZJylwb4x21dE" target="_blank" 
         class="spotify-button">🎶 Abrir en Spotify</a>
    </p>
  </div>
</body>
</html>
